<strong>Farben:</strong> <span class="memo-akk">■ blau = Akkusativ</span> &nbsp; <span class="memo-dat">■ rot = Dativ</span>`},

// ======== RENDER ========
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function memoHtml(mn,mr,k){
    const cls = k==='a'?'memo-akk':'memo-dat';
    return `<span class="${cls}">${esc(mn)}</span>${esc(mr)}`;
}

function renderSeg(sg,exId,lineIdx){
    let h='';
    for(let i=0;i<sg.length;i++){
        const s=sg[i];
        if(s.t!==undefined){
            // check if next is blank and this has no trailing space (nowrap)
            const nx=sg[i+1];
            if(nx&&nx.b!==undefined&&s.t.length>0&&!s.t.endsWith(' ')){
                const bid=`i-${exId}-${lineIdx}-${i+1}`;
                h+=`<span class="nw">${esc(s.t)}<input class="bl ${nx.z}" id="${bid}" data-sol="${nx.b}" autocomplete="off" spellcheck="false"><span class="sol" id="s-${bid}">${esc(nx.b)}</span></span>`;
                sg[i+1]._sk=1;
            } else {
                h+=esc(s.t);
            }
        } else if(s.b!==undefined&&!s._sk){
            const bid=`i-${exId}-${lineIdx}-${i}`;
            h+=`<input class="bl ${s.z}" id="${bid}" data-sol="${s.b}" autocomplete="off" spellcheck="false">`;
            h+=`<span class="sol" id="s-${bid}">${esc(s.b)}</span>`;
        } else if(s.mn!==undefined){
            h+=memoHtml(s.mn,s.mr,s.k);
        }
    }
    return h;
}

function renderAnswer(a,exId){
    const cls=a.k==='a'?'memo-akk':'memo-dat';
    const pid=`i-${exId}-3-0`;
    const aid=`i-${exId}-3-1`;
    return `<div class="ans-row">
<span class="sp b">B:</span>
<span class="hint">(${esc(a.ha)} ${esc(a.hn)})</span>
<span class="arrow">→</span>
<input class="bl m" id="${pid}" data-sol="${a.sp}" autocomplete="off" spellcheck="false"><span class="sol" id="s-${pid}">${esc(a.sp)}</span>
<input class="bl s" id="${aid}" data-sol="${a.sa}" autocomplete="off" spellcheck="false"><span class="sol" id="s-${aid}">${esc(a.sa)}</span>
<span class="noun-fixed"><span class="${cls}">${esc(a.mn)}</span>${esc(a.mr)}.</span>
</div>`;
}

function renderAll(){
    for(let si=0;si<3;si++){
        const sec=document.getElementById(`sec-${si}`);
        const m=SEC_META[si];
        const exs=DATA.filter(d=>d.s===si);
        let h=`<div class="sec-title">${m.title}</div>
<div class="sec-desc">${m.desc}</div>
<div class="help-box">${m.help}</div>`;
        exs.forEach(ex=>{
            h+=`<div class="card">`;
            h+=`<div class="card-hdr"><span class="card-nr">${String(ex.id).padStart(2,'0')}.</span><span class="card-badge">${esc(ex.verb)}</span></div>`;
            ex.L.forEach((line,li)=>{
                if(line.ans){
                    h+=renderAnswer(line,ex.id);
                } else {
                    const spCls=line.sp==='B'?'sp b':'sp';
                    // clone segments to avoid mutation issues
                    const sg=line.sg.map(s=>({...s}));
                    h+=`<div class="dl"><span class="${spCls}">${line.sp}:</span>${renderSeg(sg,ex.id,li)}</div>`;
                }
            });
            h+=`</div>`;
        });
        h+=`<div class="btn-row">
<button class="btn btn-check" onclick="check(${si})">✓ Prüfen</button>
<button class="btn btn-show" onclick="show(${si})">Lösungen</button>
<button class="btn btn-reset" onclick="reset(${si})">↺ Neu starten</button>
</div><div class="score" id="sc-${si}"></div>`;
        sec.innerHTML=h;
    }
}

// ======== LOGIC ========
function norm(s){return s.trim().toLowerCase().replace(/\s+/g,' ')}

function check(si){
    const inputs=document.querySelectorAll(`#sec-${si} input.bl`);
    let c=0,t=inputs.length;
    inputs.forEach(inp=>{
        inp.classList.remove('correct','wrong');
        const sol=norm(inp.dataset.sol);
        const val=norm(inp.value);
        if(val===sol){inp.classList.add('correct');c++}
        else if(val!=='')inp.classList.add('wrong');
    });
    const pct=t?Math.round(c/t*100):0;
    let msg=`Ergebnis: <span>${c}</span> von <span>${t}</span> richtig (${pct}%)`;
    if(pct===100) msg+=` &nbsp;🎉 Perfekt!`;
    else if(pct>=80) msg+=` &nbsp;👏 Sehr gut!`;
    else if(pct>=60) msg+=` &nbsp;👍 Gut!`;
    else msg+=` &nbsp;💪 Weiter üben!`;
    document.getElementById(`sc-${si}`).innerHTML=msg;
}

function show(si){
    const inputs=document.querySelectorAll(`#sec-${si} input.bl`);
    inputs.forEach(inp=>{
        inp.classList.remove('correct','wrong');
        inp.value=inp.dataset.sol;
        inp.classList.add('correct');
        const sol=document.getElementById(`s-${inp.id}`);
        if(sol)sol.classList.add('visible');
    });
    document.getElementById(`sc-${si}`).innerHTML='';
}

function reset(si){
    const inputs=document.querySelectorAll(`#sec-${si} input.bl`);
    inputs.forEach(inp=>{
        inp.value='';inp.classList.remove('correct','wrong');
        const sol=document.getElementById(`s-${inp.id}`);
        if(sol)sol.classList.remove('visible');
    });
    document.getElementById(`sc-${si}`).innerHTML='';
}

function showSection(idx){
    document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active',i===idx));
    document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

renderAll();
</script>
